  html,body{ height:100%; }

      radial-gradient(45% 45% at 82% 20%, rgba(0,224,84,.16), transparent 60%),
      radial-gradient(50% 50% at 50% 95%, rgba(255,128,0,.18), transparent 60%);
    filter:blur(24px); animation:drift 26s ease-in-out infinite alternate; }
  @keyframes drift{ 0%{transform:translate3d(-3%,-2%,0) scale(1.05)} 100%{transform:translate3d(4%,3%,0) scale(1.15) rotate(5deg)} }

  .dots span:nth-child(2){ background:var(--blue);  color:var(--blue); }
  .dots span:nth-child(3){ background:var(--orange);color:var(--orange); }

    background:linear-gradient(100deg,#fff,#cfe6ff 30%,var(--green) 55%,var(--blue) 75%,var(--orange));
    background-size:220% auto; -webkit-background-clip:text; background-clip:text; color:transparent; animation:shine 7s linear infinite; }

  .sub{ margin-top:8px; font-size:12px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:var(--dim); }

  /* reel */

  .glow{ position:absolute; left:8%; right:8%; height:60px; bottom:-30px; z-index:-1;
    background:radial-gradient(ellipse at center, rgba(64,188,244,.30), transparent 70%); filter:blur(14px); }
  .reel{ position:relative; border-radius:18px; overflow:hidden; background:linear-gradient(180deg,#1a2127,#0c1216);
    border:1px solid var(--line); box-shadow:0 40px 80px -24px rgba(0,0,0,.9),0 0 0 1px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.05) inset; padding:14px 0; }
  .sprockets{ position:absolute; left:0; right:0; height:14px; z-index:5; pointer-events:none; background:#05090b;
    -webkit-mask:radial-gradient(circle at 12px 50%, #0000 4.5px, #000 5px) 0 0/24px 100% repeat-x;
            mask:radial-gradient(circle at 12px 50%, #0000 4.5px, #000 5px) 0 0/24px 100% repeat-x; }
  .sprockets.top{ top:0; } .sprockets.bot{ bottom:0; }
  .track-wrap{ position:relative; height:150px; overflow:hidden; }
  .fade{ position:absolute; top:0; bottom:0; width:180px; z-index:4; pointer-events:none; }
  .fade.l{ left:0; background:linear-gradient(90deg,#0d1317 6%, transparent); }
  .fade.r{ right:0; background:linear-gradient(270deg,#0d1317 6%, transparent); }
  .sweep{ position:absolute; top:0; bottom:0; width:220px; left:-260px; z-index:3; pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent); opacity:0; }
  .reel.spinning .sweep{ animation:sweep 1.1s linear infinite; opacity:1; }
  @keyframes sweep{ to{ left:110%; } }
  .marker{ position:absolute; left:50%; top:-6px; bottom:-6px; width:3px; transform:translateX(-50%);
    background:linear-gradient(180deg,transparent,var(--orange) 16%,var(--orange) 84%,transparent);
    z-index:6; border-radius:3px; box-shadow:0 0 18px 2px rgba(255,128,0,.7); }
  .marker::before,.marker::after{ content:""; position:absolute; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent; border-right:10px solid transparent; }
  .marker::before{ top:-4px; border-top:13px solid var(--orange); }
  .marker::after{ bottom:-4px; border-bottom:13px solid var(--orange); }
  #track{ position:absolute; top:0; left:0; height:100%; display:flex; align-items:center; white-space:nowrap; will-change:transform; }
  .item{ display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    height:100%; padding:0 46px; border-right:1px solid rgba(255,255,255,.04);
    opacity:.4; filter:saturate(.5) blur(.3px); transition:opacity .25s, filter .25s, transform .25s; }
  .item .rank{ font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--green); }
  .item .title{ font-size:clamp(17px,2.3vw,25px); font-weight:800; letter-spacing:-.3px; color:#dbe3e9; max-width:44vw; overflow:hidden; text-overflow:ellipsis; }
  .item .stars{ font-size:14px; letter-spacing:2px; color:var(--orange); }
  .item .stars .num{ color:var(--dim); font-size:12px; letter-spacing:.5px; margin-left:6px; font-weight:600; }
  .item.winner{ opacity:1; filter:none; transform:scale(1.08); }
  .item.winner .title{ color:#fff; text-shadow:0 0 24px rgba(0,224,84,.6); }
  .flash{ position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0; background:radial-gradient(circle at center, rgba(0,224,84,.35), transparent 60%); }

  #spinBtn{ position:relative; border:none; cursor:pointer; overflow:hidden; font-family:var(--font);

  #spinBtn:active{ transform:translateY(-1px) scale(.99); }

  .optrow .rng{ display:inline-flex; align-items:center; gap:7px; }

  .iconbtn{ background:none; border:none; cursor:pointer; font-size:16px; padding:4px; opacity:.7; transition:opacity .15s, transform .1s; }

  .dot-sep{ width:4px; height:4px; border-radius:50%; background:#37424c; }
  .poolc{ font-size:12px; color:#5b6b76; }

  .recent summary::-webkit-details-marker{ display:none; }
  .recent summary:hover{ color:var(--dim); }
  .recent[open] summary .chev{ transform:rotate(180deg); }
  .chev{ transition:transform .2s; font-size:10px; }
  .hlist{ display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto; margin-top:8px; }
  .hrow{ display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:10px; background:rgba(255,255,255,.02); font-size:14px; }
  .hrow .hn{ color:var(--green); font-weight:800; font-size:12px; min-width:42px; }
  .hrow .ht{ flex:1; font-weight:600; color:#dbe3e9; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hrow .hs{ color:var(--orange); font-size:13px; }
  .hrow a{ color:#647581; text-decoration:none; } .hrow a:hover{ color:var(--blue); }
  .clear{ text-align:center; margin-top:8px; }
  .clear button{ font-family:var(--font); font-size:11px; letter-spacing:1px; color:#647581; background:none; border:none; cursor:pointer; }
  .clear button:hover{ color:var(--orange); }

  footer{ font-size:11px; color:#455360; text-align:center; max-width:560px; line-height:1.6; }
  footer em{ color:#5f7280; font-style:normal; }
</style>

  result=document.getElementById('result'), reel=document.getElementById('reel'), flash=document.getElementById('flash'),
  hlist=document.getElementById('hlist'), poolCount=document.getElementById('poolCount');

let seen=new Set(), history=[], spinning=false, autoTimer=null;
let opts={ range:"1-500", skipSeen:false, sound:true, auto:false };

function pool(){ const [a,b]=opts.range.split('-').map(Number);
  let p=FILMS.filter(f=>f.rank>=a && f.rank<=b);
  if(opts.skipSeen) p=p.filter(f=>!seen.has(f.rank)); return p; }
function updatePool(){ const n=pool().length; poolCount.textContent=n+" in pool"; }

/* sound */
let ac=null; function audio(){ if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)(); return ac; }
function tick(){ if(!opts.sound) return; const c=audio(); const o=c.createOscillator(),g=c.createGain();
  o.type="square"; o.frequency.value=1200+Math.random()*200; g.gain.value=.05; o.connect(g); g.connect(c.destination);
  const t=c.currentTime; o.start(t); g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.0001,t+.03); o.stop(t+.04); }
function chime(){ if(!opts.sound) return; const c=audio(); const t=c.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.type="triangle"; o.frequency.value=f;
    o.connect(g); g.connect(c.destination); const s=t+i*.09; g.gain.setValueAtTime(.0001,s);
    g.gain.exponentialRampToValueAtTime(.18,s+.02); g.gain.exponentialRampToValueAtTime(.0001,s+.5); o.start(s); o.stop(s+.55); }); }
function scheduleTicks(dur){ if(!opts.sound) return; let t=0; while(t<dur){ setTimeout(tick,t*1000); const p=t/dur; t+=.05+p*p*.5; } }

/* confetti */
const cv=document.getElementById('confetti'), cx=cv.getContext('2d'); let parts=[], confAnim=false;
function rz(){ cv.width=innerWidth; cv.height=innerHeight; } rz(); addEventListener('resize',rz);
function burst(){ const cols=['#00e054','#40bcf4','#ff8000','#ffffff']; parts=[];
  for(let i=0;i<160;i++) parts.push({ x:innerWidth/2+(Math.random()-.5)*200, y:innerHeight*.35,
    vx:(Math.random()-.5)*14, vy:Math.random()*-16-4, g:.4+Math.random()*.3, s:5+Math.random()*7,
    c:cols[i%cols.length], r:Math.random()*6, vr:(Math.random()-.5)*.4, life:120 });
  if(!confAnim) cloop(); }
function cloop(){ confAnim=true; cx.clearRect(0,0,cv.width,cv.height); let alive=false;
  parts.forEach(p=>{ if(p.life<=0) return; alive=true; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life--;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.r); cx.fillStyle=p.c; cx.globalAlpha=Math.min(1,p.life/40);
    cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); cx.restore(); });
  if(alive) requestAnimationFrame(cloop); else { confAnim=false; cx.clearRect(0,0,cv.width,cv.height); } }

/* reel */
function shuffled(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function itemHTML(f){ return `<span class="rank">#${f.rank}</span><span class="title">${f.title}</span>
  <span class="stars">${starStr(f.rating)}<span class="num">${f.rating.toFixed(2)}</span></span>`; }
function buildStrip(winner,repeats){ track.innerHTML=''; let src=pool(); if(!src.length) src=FILMS;
  const items=[]; const base = src.length<12 ? [].concat(src,src,src,src) : src;
  for(let r=0;r<repeats;r++) items.push(...shuffled(base)); items[items.length-1]=winner;
  items.forEach((f,i)=>{ const el=document.createElement('div'); el.className='item'+(i===items.length-1?' winner':'');
    el.innerHTML=itemHTML(f); track.appendChild(el); }); }

function spin(){
  if(spinning) return; const p=pool();
  if(!p.length){ result.innerHTML='<span class="label">All seen</span><span class="idle">Nothing left — clear history or widen ranks.</span>'; return; }
  audio().resume && audio().resume();
  spinning=true; btn.disabled=true; reel.classList.add('spinning');
  result.classList.remove('reveal'); result.innerHTML='<span class="label">Rolling…</span><span class="idle">🎞️ …</span>';
  const winner=p[Math.floor(Math.random()*p.length)];
  buildStrip(winner,7);
  track.style.transition='none'; track.style.transform='translateX(0px)'; void track.offsetWidth;
  const items=track.querySelectorAll('.item'); let offset=0;
  for(let i=0;i<items.length-1;i++) offset+=items[i].getBoundingClientRect().width;
  offset+=items[items.length-1].getBoundingClientRect().width/2;
  const wrapW=document.querySelector('.track-wrap').getBoundingClientRect().width; const targetX=(wrapW/2)-offset; const DUR=6;
  scheduleTicks(DUR);
  requestAnimationFrame(()=>{ track.style.transition=`transform ${DUR}s cubic-bezier(0.08,0.82,0.10,1)`; track.style.transform=`translateX(${targetX}px)`; });
  track.addEventListener('transitionend',function done(){
    track.removeEventListener('transitionend',done);
    spinning=false; btn.disabled=false; reel.classList.remove('spinning');
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go'); chime(); burst();
    seen.add(winner.rank); history.unshift(winner); renderHistory(); updatePool();
    result.classList.add('reveal');
    result.innerHTML=`<span class="label">Your film</span>
      <div class="card">
        <span class="film"><span class="rk">#${winner.rank}</span> · ${winner.title}</span>
        <span class="rstars">${starStr(winner.rating)}<span class="num">${winner.rating.toFixed(2)} / 5</span></span>
        <div class="cardbtns">
          <a href="${lbUrl(winner.title)}" target="_blank" rel="noopener">↗ Letterboxd</a>
          <button onclick="spin()">↻ Again</button>
        </div>
      </div>`;
    if(opts.auto && pool().length){ autoTimer=setTimeout(spin,2600); }
  });
}

function renderHistory(){
  hlist.innerHTML = history.length
    ? history.map(f=>`<div class="hrow"><span class="hn">#${f.rank}</span><span class="ht">${f.title}</span>
        <span class="hs">${starStr(f.rating)}</span><a href="${lbUrl(f.title)}" target="_blank" rel="noopener">↗</a></div>`).join('')
    : '<div class="hrow" style="color:#4a5762;justify-content:center">No spins yet.</div>';
}

/* wiring */
document.getElementById('rangeSel').addEventListener('change',e=>{ opts.range=e.target.value; updatePool(); });
document.getElementById('soundBtn').addEventListener('click',e=>{ opts.sound=!opts.sound; e.currentTarget.classList.toggle('off',!opts.sound); e.currentTarget.textContent=opts.sound?'🔊':'🔇'; });
document.getElementById('seenBtn').addEventListener('click',e=>{ opts.skipSeen=!opts.skipSeen; e.currentTarget.classList.toggle('off',!opts.skipSeen); updatePool(); });
document.getElementById('autoBtn').addEventListener('click',e=>{ opts.auto=!opts.auto; e.currentTarget.classList.toggle('off',!opts.auto); if(opts.auto && !spinning) spin(); else clearTimeout(autoTimer); });
document.getElementById('clearHist').addEventListener('click',()=>{ history=[]; seen.clear(); renderHistory(); updatePool(); });
addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); if(!spinning) spin(); } });

buildStrip(FILMS[0],2); updatePool(); renderHistory();
</script>
</body>
</html>
